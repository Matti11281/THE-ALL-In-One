<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEATHER-APP</title>
    <!-- Make sure her.css is in the same folder as this HTML file -->
    <link rel="stylesheet" href="her.css">
</head>
<body>
    <div class="cards">
        <div class="search">
            <input type="text" placeholder="Enter city name" spellcheck="false" id="cityInput">
            <button id="searchBtn"><img src="search.png" alt="Search"></button>
        </div>
        <div class="weather">
            <img src="rain.png" class="weather-icon" alt="Weather Icon">
            <h1 class="temp">--°C</h1>
            <h2 class="city">--</h2>
            <div class="details">
                <div class="col">
                    <img src="humidity.png" alt="Humidity Icon">
                    <div>
                        <p class="humidity">--%</p>
                        <p>Humidity</p>
                    </div>   
                </div>
                <div class="col">
                    <img src="wind.png" alt="Wind Icon">
                    <div>
                        <p class="wind">-- km/h</p>
                        <p>Wind speed</p>
                    </div>   
                </div>
            </div>
        </div>
    </div>

    <script>
    const weatherIcon = document.querySelector(".weather-icon");
    
    async function checkWeather(city) {
        try {
            // WE NOW CALL YOUR PHP FILE INSTEAD OF THE OPENWEATHER API DIRECTLY
            const response = await fetch(`weather_api.php?city=${city}`);
            
            if (!response.ok) {
                alert("City not found!");
                return;
            }
            const data = await response.json();
            console.log(data);

            document.querySelector(".city").innerHTML = data.name;
            document.querySelector(".temp").innerHTML = Math.round(data.main.temp) + "°C";
            document.querySelector(".humidity").innerHTML = data.main.humidity + "%";
            document.querySelector(".wind").innerHTML = data.wind.speed + " km/h";

            // Change weather icon dynamically
            const weatherCondition = data.weather[0].main;
            if (weatherCondition === "Clouds") {
                weatherIcon.src = "clouds.png";
            } else if (weatherCondition === "Thunderstorm") {
                weatherIcon.src = "thunderstorm.png";
            } else if (weatherCondition === "Clear") {
                weatherIcon.src = "clear.png";
            } else if (weatherCondition === "Rain") {
                weatherIcon.src = "rain.png";
            } else if (weatherCondition === "Drizzle") {
                weatherIcon.src = "drizzle.png";
            } else if (weatherCondition === "Mist") {
                weatherIcon.src = "mist.png";
            } else if (weatherCondition === "Snow") {
                weatherIcon.src = "snow.png";
            } else {
                weatherIcon.src = "default.png"; // Fallback icon
            }
        } catch (error) {
            console.error("Error fetching weather data:", error);
        }
    }

    // Search button click
    document.getElementById("searchBtn").addEventListener("click", () => {
        const city = document.getElementById("cityInput").value.trim();
        if (city) {
            checkWeather(city);
        } else {
            alert("Please enter a city name.");
        }
    });

    // Load default city weather on page load
    checkWeather("Pakistan");
</script>

</body>
</html>
