<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup</title>
    <link rel="stylesheet" href="up.css">
    <script src="https://kit.fontawesome.com/156d4e5e28.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="flip-container">
        <div class="flip-card" id="flipCard">
            
            <div class="login-side">
                <div class="Wrapper">
                    <form id="loginForm">
                        <h1>Login</h1>
                        <div class="input-box">
                            <input type="text" name="username" placeholder="Username">
                            <i class="fa-regular fa-user"></i>
                        </div>
                        <div class="input-box">
                           <input type="password" name="password" placeholder="Password">
                            <i class="fa-solid fa-lock"></i>
                        </div>
                        <div class="remember-forgot">
                            <label><input type="checkbox"> Remember Me</label>
                            <a href="#">Forgot Password?</a>
                        </div>
                        <button type="submit" class="btn">Login</button>
                        <div class="register-link">
                            <p>Don't have an account? <a href="#" id="toRegister">Register Now</a></p>
                        </div>
                    </form>
                </div>
            </div>

            <div class="signup-side">
                <div class="container">
                    <header>Signup Form</header>
                    <div class="progress-bar">
                        <div class="step"><p>Name</p><div class="bullet"><span>1</span></div><div class="check fas fa-check"></div></div>
                        <div class="step"><p>Contact</p><div class="bullet"><span>2</span></div><div class="check fas fa-check"></div></div>
                        <div class="step"><p>Birth</p><div class="bullet"><span>3</span></div><div class="check fas fa-check"></div></div>
                        <div class="step"><p>Submit</p><div class="bullet"><span>4</span></div><div class="check fas fa-check"></div></div>
                    </div>
                    <div class="form-outer">
                       <form id="signupForm" action="signup.php" method="POST">
                            <div class="page slide-page">
                                <div class="title">Basic Info:</div>
                                <div class="field"><div class="label">First Name</div>
                                <input type="text" name="firstname"></div>
                                <div class="field"><div class="label">Last Name</div>
                                <input type="text" name="lastname"></div>
                                <div class="field"><button class="firstNext next">Next</button></div>
                            </div>
                            <div class="page">
                                <div class="title">Contact Info:</div>
                                <div class="field"><div class="label">Email Address</div>
                              <input type="text" name="email"></div>
                                <div class="field"><div class="label">Phone Number</div>
                                <input type="number" name="phone"></div>
                                <div class="field btns">
                                    <button class="prev-1 prev">Previous</button>
                                    <button class="next-1 next">Next</button>
                                </div>
                            </div>
                            <div class="page">
                                <div class="title">Date of Birth:</div>
                                <div class="field"><div class="label">Date</div>
                               <input type="text" name="dob"></div>
                                <div class="field">
                                    <div class="label">Gender</div>
                                  <select name="gender">
                                        <option value="Male">Male</option>
                                        <option value="Female">Female</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                                <div class="field btns">
                                    <button class="prev-2 prev">Previous</button>
                                    <button class="next-2 next">Next</button>
                                </div>
                            </div>
                            <div class="page">
                                <div class="title">Login Details:</div>
                                <div class="field"><div class="label">Username</div>
                                <input type="text" name="username"></div>
                                <div class="field"><div class="label">Password</div>
                                <input type="password" name="password"></div>
                                <div class="field btns">
                                    <button class="prev-3 prev">Previous</button>
                                    <button type="submit" class="submit">Submit</button>
                                </div>
                                <p style="text-align:center;margin-top:10px; color:#fff;">Already have an account? <a href="#" id="toLogin" style="color:#fff; font-weight:bold;">Back to Login</a></p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>


    


</section>
    <script src="LoginR.js"></script>

 <script>
document.getElementById("loginForm").addEventListener("submit", function(e){
e.preventDefault();

let username = document.querySelector("[name='username']").value;
let password = document.querySelector("[name='password']").value;

fetch("login.php",{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:"username="+username+"&password="+password
})
.then(res=>res.text())
.then(data=>{

if(data === "wrong"){
alert("Wrong password");
}
else if(data === "notfound"){
alert("User not found");
}
else{
window.location = "otp.html"; // 🔥 go to OTP page
}

});
});
</script>

<div id="loader" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(5px);
z-index:9999;
align-items:center;
justify-content:center;
">

  <div class="spinner"></div>

</div>
</body>
</html>
